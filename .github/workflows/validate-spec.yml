name: Validate Spec Submission

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    paths:
      - "content/specs/*.mdx"

jobs:
  Validate-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get changed files
        id: files
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files: $CHANGED_FILES"

          SPEC_FILES=$(printf '%s' "$CHANGED_FILES" | grep "^content/specs/[^/]*\.mdx$" || true)
          {
            echo "spec_files<<EOF"
            echo "$SPEC_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -z "$CHANGED_FILES" ]; then
            OTHER_FILES=0
          else
            OTHER_FILES=$(printf '%s' "$CHANGED_FILES" | grep -vc "^content/specs/[^/]*\.mdx$" || true)
          fi
          echo "other_files=$OTHER_FILES" >> "$GITHUB_OUTPUT"

      - name: Verify only spec files changed
        id: scope_check
        if: steps.files.outputs.other_files != '0'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "❌ PR modified files outside content/specs/"
          echo ""
          echo "All files changed in this PR:"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | sed 's/^/  /'
          echo ""
          echo "Files outside content/specs/*.mdx (these are the problem):"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -v "^content/specs/[^/]*\.mdx$" \
            | sed 's/^/  /' || true
          echo ""
          echo "Only .mdx files directly in content/specs/ should be modified."
          exit 1

      - name: Validate spec files
        id: validation
        env:
          SPEC_FILES: ${{ steps.files.outputs.spec_files }}
        run: |
          readarray -t files <<< "$SPEC_FILES"
          node .github/scripts/validate-specs.js "${files[@]}"

      - name: Post validation summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = `${{ steps.files.outputs.spec_files }}`
              .split('\n')
              .filter(f => f.trim().length > 0);

            const scopePassed = '${{ steps.scope_check.outcome }}' !== 'failure';
            const validationPassed = '${{ steps.validation.outcome }}' === 'success';

            let summary = '## Validation Results\n\n';

            if (changedFiles.length === 0) {
              summary += '❌ No spec files found in this PR\n';
            } else {
              summary += `Found ${changedFiles.length} spec file(s):\n\n`;
              changedFiles.forEach(file => {
                summary += `- \`${file}\`\n`;
              });
              summary += '\n### Checks\n\n';
              summary += `- ${scopePassed ? '✅' : '❌'} Only spec files modified\n`;
              summary += `- ${validationPassed ? '✅' : '❌'} Spec file validation passed\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('Validation Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: summary,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary,
              });
            }
