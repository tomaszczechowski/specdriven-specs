name: Validate Spec Submission

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    paths:
      - "content/specs/**"

jobs:
  Validate-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get changed files
        id: files
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED_FILES" | sed 's/^/  /'

          SPEC_FILES=$(printf '%s\n' "$CHANGED_FILES" | grep -E "^content/specs/[^/]+/.+" || true)
          SLUGS=$(printf '%s\n' "$SPEC_FILES" | awk -F'/' 'NF>=3 {print $3}' | sort -u)

          if [ -z "$CHANGED_FILES" ]; then
            OTHER_FILES=0
          else
            OTHER_FILES=$(printf '%s\n' "$CHANGED_FILES" | grep -vcE "^content/specs/[^/]+/.+" || true)
          fi

          {
            echo "slugs<<EOF"
            echo "$SLUGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "other_files=$OTHER_FILES" >> "$GITHUB_OUTPUT"

      - name: Verify only spec files changed
        id: scope_check
        if: steps.files.outputs.other_files != '0'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "❌ PR modified files outside content/specs/<slug>/"
          echo ""
          echo "Files outside the specs tree:"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -vE "^content/specs/[^/]+/.+" \
            | sed 's/^/  /' || true
          exit 1

      - name: Validate spec directories
        id: validation
        env:
          SLUGS: ${{ steps.files.outputs.slugs }}
        run: |
          readarray -t slugs <<< "$SLUGS"
          filtered=()
          for s in "${slugs[@]}"; do
            [ -n "$s" ] && filtered+=("$s")
          done
          if [ ${#filtered[@]} -eq 0 ]; then
            echo "No spec directories changed."
            exit 0
          fi
          node .github/scripts/validate-specs.js "${filtered[@]}"

      - name: Post validation summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const slugs = `${{ steps.files.outputs.slugs }}`
              .split('\n')
              .map(s => s.trim())
              .filter(s => s.length > 0);

            const scopePassed = '${{ steps.scope_check.outcome }}' !== 'failure';
            const validationPassed = '${{ steps.validation.outcome }}' === 'success';

            let summary = '## Validation Results\n\n';

            if (slugs.length === 0) {
              summary += '❌ No spec directories found in this PR\n';
            } else {
              summary += `Found ${slugs.length} spec director${slugs.length === 1 ? 'y' : 'ies'}:\n\n`;
              slugs.forEach(s => { summary += `- \`content/specs/${s}/\`\n`; });
              summary += '\n### Checks\n\n';
              summary += `- ${scopePassed ? '✅' : '❌'} Only files under content/specs/ modified\n`;
              summary += `- ${validationPassed ? '✅' : '❌'} Spec validation passed\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Validation Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: summary,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary,
              });
            }
