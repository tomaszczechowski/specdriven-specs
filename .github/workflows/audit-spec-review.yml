name: Audit Spec Review

# Runs the Spec Review auditor on PRs touching spec content (for comment/gate),
# once more immediately after merge (to commit scores to main), and on a nightly schedule.
#
# All github.event values flow through env: vars before reaching run: scripts
# to avoid actions-injection vectors. See:
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
#
# Required configuration:
#   • Repository secret  ANTHROPIC_API_KEY  ← Anthropic API key
# Optional:
#   • Repository variable ANTHROPIC_MODEL   ← override model (default: claude-haiku-4-5-20251001)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "content/specs/**"
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  Audit-Spec-Content:
    # Skip closed-but-not-merged PRs — nothing to audit or commit.
    if: github.event_name != 'pull_request' || github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      # For merged PRs check out main (where the commit must land).
      # For open PRs and cron/manual use the default ref.
      - uses: actions/checkout@v4
        if: github.event.pull_request.merged != true
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        if: github.event.pull_request.merged == true
        with:
          fetch-depth: 0
          ref: ${{ github.base_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine specs to audit
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'content/specs/*' | awk -F/ '{print $3}' | sort -u | paste -sd, -)
            printf 'filter=%s\n' "$changed" >> "$GITHUB_OUTPUT"
            printf 'Reviewing PR-touched specs: %s\n' "$changed"
          else
            printf 'filter=\n' >> "$GITHUB_OUTPUT"
            printf 'Reviewing all specs\n'
          fi

      - name: Run Spec Review auditor
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          SPECS_FILTER: ${{ steps.filter.outputs.filter }}
        run: node .github/scripts/audit-spec-review.mjs

      - name: Commit audit results to main
        if: github.event.pull_request.merged == true || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "$(git status --porcelain content/specs)" ]; then
            git config user.name "specdriven-bot"
            git config user.email "bot@specdriven.sh"
            git add content/specs
            git commit -m "chore(audits): refresh spec review scores ($(date -u +%Y-%m-%d)) [skip ci]"
            git push
          else
            echo "No audit changes to commit."
          fi

      - name: Comment on PR with review summary
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        uses: actions/github-script@v7
        env:
          FAILURES: ${{ steps.review.outputs.failures }}
          FILTER: ${{ steps.filter.outputs.filter }}
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const filter = (process.env.FILTER || "").split(",").filter(Boolean);
            const rows = [];

            for (const slug of filter) {
              const metaPath = path.join("content", "specs", slug, "specdriven-metadata.json");
              if (!fs.existsSync(metaPath)) continue;
              const meta = JSON.parse(fs.readFileSync(metaPath, "utf8"));
              const r = meta?.audits?.["spec-review"];
              if (!r) continue;
              const score = typeof r.score === "number" ? ` · ${r.score}` : "";
              const badge = r.status === "pass" ? "✅" : r.status === "warn" ? "⚠️" : r.status === "fail" ? "❌" : "❓";
              const note = r.notes ? ` — ${r.notes}` : "";
              rows.push(`| \`${slug}\` | ${badge} **${r.status}**${score} | ${r.checked} |${note} |`);
            }

            const failures = Number(process.env.FAILURES || 0);
            const header = failures > 0
              ? `### ❌ Audit Spec Review — ${failures} spec${failures === 1 ? "" : "s"} below quality bar`
              : `### ✅ Audit Spec Review`;

            const body = rows.length
              ? `${header}\n\n| Spec | Status | Checked | Notes |\n|------|--------|---------|-------|\n${rows.join("\n")}\n\n_Score thresholds: 80+ pass · 60-79 warn · <60 fail. Reviewed against \`SPEC_REQUIREMENTS.md\`._`
              : `${header}\n\nNo spec metadata changes detected.`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail on quality failures (open PR only)
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && steps.review.outputs.failures != '0' && steps.review.outputs.failures != ''
        env:
          FAILURES: ${{ steps.review.outputs.failures }}
        run: |
          printf '::error::Spec Review failures detected: %s\n' "$FAILURES"
          exit 1
